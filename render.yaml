services:
  - type: web
    name: chat-backend
    env: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: chat-db
          property: connectionString
      - key: CORS_ORIGIN
        value: '*'

databases:
  - name: chat-db
    plan: free
